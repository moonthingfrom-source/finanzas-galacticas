<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzas Galácticas — Aprende Finanzas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Fraunces:wght@400;600;700&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --papel: #0B1626;
    --papel-linea: #16273D;
    --tinta: #E8F6FF;
    --tinta-suave: #8FD8FF;
    --oro: #00E5FF;
    --oro-claro: #7BF3FF;
    --verde-sello: #39FF88;
    --rojo-alerta: #FF4D6D;
    --sombra: rgba(0,229,255,0.25);
    --panel: #101E33;
    --panel-hover: #1B2E4A;
    --exito-bg: rgba(57,255,136,0.14);
    --error-bg: rgba(255,77,109,0.14);
    --tinta-oscura: #081018;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background: var(--papel);
    background-image:
      repeating-linear-gradient(var(--papel) 0px, var(--papel) 38px, var(--papel-linea) 39px);
    font-family:'Nunito Sans', sans-serif;
    color: var(--tinta);
    display:flex;
    justify-content:center;
    padding: 28px 16px 60px;
  }
  .libreta{
    width:100%;
    max-width: 720px;
    background: var(--panel);
    border: 3px solid var(--tinta);
    border-radius: 14px;
    box-shadow: 0 12px 0 var(--sombra), 0 14px 30px rgba(0,0,0,0.15);
    padding: 30px 26px 34px;
    position:relative;
    overflow:hidden;
  }
  .libreta::before{
    content:"";
    position:absolute;
    left:0; top:0; bottom:0;
    width:14px;
    background: repeating-linear-gradient(180deg, var(--oro) 0 10px, var(--oro-claro) 10px 20px);
  }
  header.top{
    text-align:center;
    margin-bottom: 18px;
    padding-left: 10px;
  }
  header.top .eyebrow{
    letter-spacing: 3px;
    text-transform: uppercase;
    font-size: 12.5px;
    font-weight: 800;
    color: var(--oro);
  }
  h1{
    font-family:'Orbitron', sans-serif;
    font-size: clamp(24px, 5.5vw, 32px);
    font-weight:800;
    letter-spacing: 1px;
    margin: 4px 0 2px;
    color: var(--tinta);
    text-shadow: 0 0 14px var(--sombra);
  }
  .subt{
    font-size: 17px;
    color: var(--tinta-suave);
    font-weight:600;
  }
  .sellos{
    display:flex;
    justify-content:center;
    gap:10px;
    margin: 18px 0 6px;
    padding-left:10px;
    flex-wrap: wrap;
  }
  .sello{
    width:42px;height:42px;
    border-radius:50%;
    border: 2.5px dashed var(--papel-linea);
    display:flex; align-items:center; justify-content:center;
    font-size:20px;
    background: var(--panel);
  }
  .sello.ganado{
    border: 2.5px solid var(--verde-sello);
    background: var(--exito-bg);
  }
  .pantalla{padding-left:10px;}
  .tarjeta-cat{
    display:flex;
    align-items:center;
    gap:16px;
    width:100%;
    text-align:left;
    background: var(--panel);
    border:2px solid var(--tinta);
    border-radius:12px;
    padding:16px 18px;
    margin-bottom:14px;
    cursor:pointer;
    font-family:'Nunito Sans', sans-serif;
    font-size:19px;
    font-weight:700;
    color:var(--tinta);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .tarjeta-cat:hover, .tarjeta-cat:focus-visible{
    transform: translateY(-2px);
    box-shadow: 0 5px 0 var(--oro);
    outline: 3px solid var(--oro);
  }
  .tarjeta-cat .icono{
    font-size:30px;
    width:48px; text-align:center;
  }
  .tarjeta-cat .meta{
    font-size:14px;
    font-weight:600;
    color: var(--tinta-suave);
    display:block;
    margin-top:2px;
  }
  .barra-progreso{
    height:14px;
    background:var(--papel-linea);
    border-radius:8px;
    overflow:hidden;
    margin: 10px 0 22px;
    border:1.5px solid var(--tinta);
  }
  .barra-progreso > div{
    height:100%;
    background: var(--oro);
    transition: width .3s ease;
  }
  .pregunta-num{
    font-weight:800;
    color:var(--oro);
    letter-spacing:1px;
    text-transform:uppercase;
    font-size:13px;
  }
  .pregunta-texto{
    font-family:'Fraunces', serif;
    font-size: 24px;
    line-height:1.35;
    margin: 8px 0 20px;
  }
  .opciones{display:flex; flex-direction:column; gap:12px;}
  .opcion{
    text-align:left;
    background: var(--panel);
    border:2px solid var(--tinta);
    border-radius:10px;
    padding:16px 18px;
    font-size:18px;
    font-family:'Nunito Sans', sans-serif;
    font-weight:600;
    color:var(--tinta);
    cursor:pointer;
  }
  .opcion:hover, .opcion:focus-visible{
    background: var(--panel-hover);
    outline: 3px solid var(--oro);
  }
  .opcion.correcta{
    background: var(--exito-bg);
    border-color: var(--verde-sello);
  }
  .opcion.incorrecta{
    background: var(--error-bg);
    border-color: var(--rojo-alerta);
  }
  .opcion:disabled{cursor:default;}
  .retro{
    margin-top: 18px;
    padding: 16px 18px;
    border-radius: 10px;
    font-size:17px;
    line-height:1.5;
    font-weight:600;
    display:none;
  }
  .retro.mostrar{display:block;}
  .retro.bien{ background: var(--exito-bg); color:var(--verde-sello); border:2px solid var(--verde-sello); }
  .retro.mal{ background: var(--error-bg); color:var(--rojo-alerta); border:2px solid var(--rojo-alerta); }
  .btn-siguiente{
    margin-top:18px;
    background: var(--tinta-oscura);
    color:#fff;
    border:none;
    padding: 14px 26px;
    font-size:18px;
    font-weight:800;
    border-radius: 10px;
    cursor:pointer;
    display:none;
  }
  .btn-siguiente.mostrar{display:inline-block;}
  .btn-siguiente:hover{background: var(--tinta-suave);}
  .volver{
    background:none;
    border:none;
    color:var(--tinta-suave);
    font-weight:800;
    font-size:15px;
    cursor:pointer;
    padding: 6px 0 16px;
    text-decoration: underline;
  }
  .resultado{
    text-align:center;
    padding: 10px 10px 6px;
  }
  .resultado .moneda{
    font-size: 52px;
  }
  .resultado h2{
    font-family:'Fraunces', serif;
    font-size:28px;
    margin: 6px 0 4px;
  }
  .resultado p{font-size:17px; color:var(--tinta-suave); font-weight:600;}
  .btn-cat{
    background: var(--oro);
    color:var(--tinta-oscura);
    border:none;
    padding:14px 24px;
    font-size:17px;
    font-weight:800;
    border-radius:10px;
    cursor:pointer;
    margin-top:10px;
  }
  footer.pie{
    text-align:center;
    margin-top:20px;
    font-size:13px;
    color:var(--tinta-suave);
    padding-left:10px;
  }
  .tarjeta-modo{
    display:flex;
    align-items:center;
    gap:16px;
    width:100%;
    text-align:left;
    background: var(--panel);
    border:2.5px solid var(--tinta);
    border-radius:14px;
    padding:20px;
    margin-bottom:16px;
    cursor:pointer;
    font-family:'Nunito Sans', sans-serif;
    color:var(--tinta);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .tarjeta-modo:hover, .tarjeta-modo:focus-visible{
    transform: translateY(-2px);
    box-shadow: 0 6px 0 var(--oro);
    outline: 3px solid var(--oro);
  }
  .tarjeta-modo .icono{ font-size:38px; width:56px; text-align:center; }
  .tarjeta-modo .titulo-modo{ font-size:21px; font-weight:800; display:block; }
  .tarjeta-modo .meta{ font-size:14.5px; font-weight:600; color:var(--tinta-suave); display:block; margin-top:3px;}
  .volver-principal{
    background:none; border:none; color:var(--tinta-suave); font-weight:800;
    font-size:15px; cursor:pointer; padding: 6px 0 16px; text-decoration: underline;
  }
  .caja-ahorcado{
    display:flex; flex-direction:column; align-items:center; gap:16px;
  }
  .dibujo-ahorcado{
    font-family:'Courier New', monospace;
    font-size: 20px;
    line-height:1.15;
    white-space:pre;
    background: var(--panel-hover);
    border:2px solid var(--tinta);
    border-radius:10px;
    padding:14px 20px;
  }
  .pista-ahorcado{
    font-size:17px;
    font-weight:700;
    color: var(--tinta-suave);
    text-align:center;
  }
  .palabra-oculta{
    font-family:'Fraunces', serif;
    font-size: clamp(24px,6vw,34px);
    letter-spacing: 8px;
    font-weight:700;
  }
  .teclado{
    display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-width: 460px;
  }
  .tecla{
    width:42px; height:42px;
    border-radius:8px;
    border:2px solid var(--tinta);
    background: var(--panel);
    font-weight:800;
    font-size:17px;
    cursor:pointer;
  }
  .tecla:hover:not(:disabled), .tecla:focus-visible{ background: var(--panel-hover); outline:2px solid var(--oro); }
  .tecla:disabled{ opacity:0.4; cursor:default; }
  .tecla.acierto{ background: var(--exito-bg); border-color:var(--verde-sello); }
  .tecla.fallo{ background: var(--error-bg); border-color:var(--rojo-alerta); }
  .mensaje-final{
    font-size:19px; font-weight:800; text-align:center;
  }
  @media (max-width:480px){
    .pregunta-texto{font-size:20px;}
    .tarjeta-cat{font-size:17px; padding:14px;}
    .dibujo-ahorcado{font-size:15px;}
    .tecla{width:36px; height:36px; font-size:15px;}
  }

  /* Memorama */
  .memorama-grid{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:10px;
    max-width: 420px;
    margin: 0 auto;
  }
  .carta-memorama{
    aspect-ratio: 1;
    border-radius:10px;
    border:2px solid var(--oro);
    background: var(--tinta-oscura);
    display:flex; align-items:center; justify-content:center;
    font-size: clamp(22px,6vw,32px);
    cursor:pointer;
  }
  .carta-memorama.volteada, .carta-memorama.emparejada{
    background: var(--panel);
  }
  .carta-memorama.emparejada{
    border-color: var(--verde-sello);
    background: var(--exito-bg);
    cursor:default;
  }
  .info-juego{
    text-align:center;
    font-weight:700;
    color:var(--tinta-suave);
    margin-bottom:14px;
  }

  /* Sopa de letras */
  .sopa-grid{
    display:grid;
    gap:3px;
    max-width: 420px;
    margin: 0 auto 18px;
  }
  .celda-sopa{
    aspect-ratio:1;
    display:flex; align-items:center; justify-content:center;
    background: var(--panel);
    border:1.5px solid var(--papel-linea);
    border-radius:4px;
    font-weight:800;
    font-size: 14px;
    cursor:pointer;
    user-select:none;
  }
  .celda-sopa.seleccionada{ background: var(--oro-claro); }
  .celda-sopa.encontrada{ background: var(--exito-bg); border-color: var(--verde-sello); color: var(--verde-sello); }
  .lista-palabras{
    display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:10px;
  }
  .palabra-chip{
    padding:6px 12px;
    border-radius: 20px;
    border:2px solid var(--tinta);
    font-size:14px;
    font-weight:700;
  }
  .palabra-chip.encontrada{
    background: var(--exito-bg); border-color:var(--verde-sello); color:var(--verde-sello);
    text-decoration: line-through;
  }

  /* Barra de jugador */
  .barra-jugador{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
    margin: 10px 0 4px;
    padding-left:10px;
  }
  .chip-jugador{
    display:flex; align-items:center; gap:6px;
    background: var(--panel);
    border:2px solid var(--tinta);
    border-radius: 20px;
    padding:6px 14px;
    font-weight:800;
    font-size:14.5px;
  }
  .chip-jugador .avatar-mini{
    display:inline-flex;
    position:relative;
    width:28px; height:28px;
  }
  .chip-jugador .avatar-mini svg{ width:28px; height:28px; display:block; }
  .chip-jugador .avatar-mini .accesorio-mini{
    position:absolute; top:-9px; right:-9px;
    font-size:14px; line-height:1;
  }
  .chip-nivel{ background: var(--tinta-oscura); color:var(--oro); border:1px solid var(--oro); }

  /* Selección de personaje */
  .avatares-grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:12px;
    max-width: 380px;
    margin: 0 auto 18px;
  }
  .opcion-avatar{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    background: var(--panel);
    border:2.5px solid var(--tinta);
    border-radius:14px;
    padding:10px 6px 12px;
    cursor:pointer;
  }
  .opcion-avatar svg{ width:64px; height:64px; display:block; }
  .opcion-avatar .nombre-avatar{
    font-size:11.5px;
    font-weight:800;
    color: var(--tinta-suave);
    text-align:center;
    line-height:1.25;
  }
  .opcion-avatar:hover, .opcion-avatar:focus-visible{
    background: var(--panel-hover); outline:3px solid var(--oro);
  }
  .opcion-avatar.elegido{
    background: var(--exito-bg); border-color: var(--verde-sello);
  }

  /* Logros */
  .logros-grid{
    display:flex; flex-direction:column; gap:12px;
  }
  .logro-item{
    display:flex; align-items:center; gap:14px;
    background: var(--panel);
    border:2px solid var(--tinta);
    border-radius:12px;
    padding:14px 16px;
  }
  .logro-item.bloqueado{
    opacity:0.45;
  }
  .logro-item .icono-logro{ font-size:30px; width:42px; text-align:center; }
  .logro-item .titulo-logro{ font-weight:800; font-size:16.5px; display:block; }
  .logro-item .desc-logro{ font-size:13.5px; color:var(--tinta-suave); font-weight:600; }

  /* Ruleta */
  .ruleta-wrap{
    display:flex; flex-direction:column; align-items:center; gap:18px;
  }
  .ruleta-exterior{
    position:relative;
    width:260px; height:260px;
  }
  .ruleta-flecha{
    position:absolute;
    top:-14px; left:50%;
    transform: translateX(-50%);
    font-size:30px;
    z-index:5;
  }
  .ruleta-circulo{
    width:260px; height:260px;
    border-radius:50%;
    border: 5px solid var(--tinta);
    position:relative;
    transition: transform 3.5s cubic-bezier(0.17, 0.89, 0.32, 1.1);
  }
  .ruleta-etiqueta{
    position:absolute;
    top:50%; left:50%;
    width:110px;
    text-align:center;
    font-size:11.5px;
    font-weight:800;
    color:var(--tinta-oscura);
    transform-origin: 0% 0%;
  }
  .btn-girar{
    background: var(--oro);
    color:var(--tinta-oscura);
    border:none;
    padding:16px 34px;
    font-size:19px;
    font-weight:800;
    border-radius:12px;
    cursor:pointer;
  }
  .btn-girar:disabled{ opacity:0.5; cursor:default; }

  /* Confeti */
  .confeti-capa{
    position:fixed; inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:999;
  }
  .confeti-pieza{
    position:absolute;
    top:-30px;
    font-size:22px;
    animation: caerConfeti 2.4s ease-in forwards;
  }
  @keyframes caerConfeti{
    0%{ transform: translateY(0) rotate(0deg); opacity:1; }
    100%{ transform: translateY(115vh) rotate(360deg); opacity:0; }
  }

  /* Certificado */
  .certificado{
    border: 6px double var(--oro);
    border-radius: 16px;
    padding: 30px 22px;
    text-align:center;
    background: linear-gradient(180deg, var(--panel), var(--papel));
  }
  .certificado .sello-cert{ font-size:44px; }
  .certificado h2{
    font-family:'Fraunces', serif;
    font-size: clamp(22px, 6vw, 30px);
    margin: 6px 0 0;
    color: var(--tinta);
  }
  .certificado .linea-cert{
    font-size:15px;
    color:var(--tinta-suave);
    font-weight:700;
    margin: 4px 0 18px;
  }
  .certificado input[type=text]{
    font-family:'Fraunces', serif;
    font-size:22px;
    text-align:center;
    border:none;
    border-bottom: 2px solid var(--tinta);
    background:transparent;
    padding:6px;
    width: 90%;
    max-width:340px;
    color: var(--tinta);
    margin-bottom: 6px;
  }
  .certificado .etiqueta-campo{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:2px;
    color:var(--tinta-suave);
    font-weight:800;
    margin-top:14px;
  }
  .certificado .dato-cert{
    font-size:18px;
    font-weight:700;
    color:var(--tinta);
  }
  .certificado .premio-cert{
    margin-top:16px;
    font-size:15px;
    font-weight:700;
    color: var(--oro);
  }
  .btn-imprimir{
    margin-top:20px;
    background: var(--tinta-oscura);
    color:#fff;
    border:none;
    padding:14px 26px;
    font-size:17px;
    font-weight:800;
    border-radius:10px;
    cursor:pointer;
  }
  @media print{
    body *{ visibility:hidden; }
    #certificadoImprimible, #certificadoImprimible *{ visibility:visible; }
    #certificadoImprimible{ position:absolute; top:0; left:0; width:100%; }
    .btn-imprimir, .volver-principal{ display:none !important; }
  }

  /* Tienda */
  .tienda-lista{ display:flex; flex-direction:column; gap:12px; margin-bottom:6px; }
  .tienda-item{
    display:flex; align-items:center; gap:12px;
    background: var(--panel);
    border:2px solid var(--tinta);
    border-radius:12px;
    padding:12px 14px;
  }
  .icono-tienda{ font-size:28px; width:40px; text-align:center; }
  .info-tienda{ flex:1; }
  .nombre-tienda{ font-weight:800; font-size:15.5px; display:block; }
  .desc-tienda{ font-size:12.5px; color:var(--tinta-suave); font-weight:600; }
  .cantidad-tienda{ color:var(--oro); font-weight:800; }
  .btn-comprar{
    background: var(--oro);
    color:var(--tinta-oscura);
    border:none;
    padding:10px 14px;
    border-radius:8px;
    font-weight:800;
    font-size:13.5px;
    cursor:pointer;
    white-space:nowrap;
  }
  .btn-comprar.equipado{ background: var(--verde-sello); }

  /* Cronómetro de preguntas */
  .barra-cronometro{
    height:14px;
    background:var(--papel-linea);
    border-radius:8px;
    overflow:hidden;
    margin-bottom:10px;
    border:1.5px solid var(--tinta);
  }
  .barra-cronometro > div{
    height:100%;
    background: var(--rojo-alerta);
    transition: width 1s linear;
  }
  .fila-ayudas{
    display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap;
  }
  .btn-ayuda{
    background: var(--panel);
    border:2px solid var(--tinta);
    border-radius:8px;
    padding:8px 12px;
    font-size:13.5px;
    font-weight:800;
    cursor:pointer;
  }
  .btn-ayuda:disabled{ opacity:0.4; cursor:default; }
  .racha-aviso{
    text-align:center;
    font-weight:800;
    color: var(--oro);
    font-size:15px;
    margin-bottom:8px;
  }
  .caja-codigo{
    width:100%;
    font-family:'Courier New', monospace;
    font-size:13px;
    padding:10px;
    border:2px solid var(--tinta);
    border-radius:8px;
    background: var(--panel);
    color: var(--tinta);
    resize:vertical;
    margin-bottom:10px;
  }
.logo-titulo{max-width:450px;width:100%;height:auto;display:block;margin:8px auto 6px;}
</style>
</head>
<body>
<div class="libreta" id="libreta">

  <header class="top">
    <div class="eyebrow">Misión de ahorro intergaláctica</div>
    <img src="logo-asset.png" alt="Finanzas Galácticas" class="logo-titulo">
    <div class="subt">Una aventura espacial para aprender a cuidar tu dinero</div>
  </header>

  <div class="barra-jugador" id="barraJugador"></div>

  <div class="sellos" id="sellos"></div>

  <div class="pantalla" id="pantalla"></div>

  <footer class="pie">Contesta con calma. No hay tiempo límite — cada sello se gana con calma, no con prisa.</footer>
</div>

<script>

// ---------- SONIDO ----------
let sonidoActivado = true;
let audioCtx = null;

function obtenerAudioCtx(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ return null; }
  }
  if(audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function tono(freq, duracion, tipo, volumen, retraso){
  if(!sonidoActivado) return;
  const ctx = obtenerAudioCtx();
  if(!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = tipo || 'sine';
  osc.frequency.value = freq;
  const inicio = ctx.currentTime + (retraso || 0);
  const vol = volumen || 0.15;
  gain.gain.setValueAtTime(vol, inicio);
  gain.gain.exponentialRampToValueAtTime(0.0001, inicio + duracion);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(inicio);
  osc.stop(inicio + duracion + 0.02);
}

function sonidoAcierto(){ tono(660,0.12,'sine',0.16,0); tono(880,0.15,'sine',0.14,0.08); }
function sonidoError(){ tono(180,0.28,'sawtooth',0.13,0); }
function sonidoMoneda(){ tono(988,0.08,'square',0.10,0); tono(1319,0.1,'square',0.10,0.06); }
function sonidoClic(){ tono(440,0.05,'sine',0.07,0); }
function sonidoGirar(){ for(let i=0;i<8;i++){ tono(300+i*12, 0.05, 'square', 0.07, i*0.16); } }
function sonidoVictoria(){ [523,659,784,1047].forEach((f,i)=> tono(f,0.22,'sine',0.15,i*0.13)); }

function alternarSonido(){
  sonidoActivado = !sonidoActivado;
  if(sonidoActivado) obtenerAudioCtx();
  renderBarraJugador();
}

function ganarMonedas(cant){
  monedas += cant;
  if(cant > 0) sonidoMoneda();
  renderBarraJugador();
}

function gastarMonedas(cant){
  monedas = Math.max(0, monedas - cant);
  renderBarraJugador();
}

function renderBarraJugador(){
  const cont = document.getElementById('barraJugador');
  if(!cont) return;
  const nivel = nivelActual();
  const acc = ACCESORIOS.find(a=>a.id===accesorioEquipado);
  const avatarObj = AVATARES.find(a=>a.id===avatarElegido);
  let inventarioHtml = '';
  if(inventario.tiempoExtra > 0) inventarioHtml += `<div class="chip-jugador">⏱️ x${inventario.tiempoExtra}</div>`;
  if(inventario.pistas > 0) inventarioHtml += `<div class="chip-jugador">💡 x${inventario.pistas}</div>`;
  cont.innerHTML = `
    <div class="chip-jugador"><span class="avatar-mini">${avatarObj ? construirSVGAvatar(avatarObj) : '🙂'}${acc ? `<span class="accesorio-mini">${acc.icono}</span>` : ''}</span></div>

    ${inventarioHtml}

  `;
  const btnSonido = document.getElementById('btnSonido');
  if(btnSonido) btnSonido.addEventListener('click', alternarSonido);
}

function generarCodigoGuardado(){
  const estado = {
    monedas, avatarElegido, accesorioEquipado, accesoriosComprados,
    inventario, progresoCategorias, progresoModos, nombreCertificado
  };
  try{
    return btoa(encodeURIComponent(JSON.stringify(estado)));
  }catch(e){
    return '';
  }
}

function cargarCodigoGuardado(codigo){
  try{
    const estado = JSON.parse(decodeURIComponent(atob(codigo.trim())));
    if(typeof estado.monedas === 'number') monedas = estado.monedas;
    if(estado.avatarElegido) avatarElegido = estado.avatarElegido;
    if(estado.accesorioEquipado !== undefined) accesorioEquipado = estado.accesorioEquipado;
    if(Array.isArray(estado.accesoriosComprados)) accesoriosComprados = estado.accesoriosComprados;
    if(estado.inventario) inventario = Object.assign({tiempoExtra:0, pistas:0}, estado.inventario);
    if(estado.progresoCategorias) Object.assign(progresoCategorias, estado.progresoCategorias);
    if(estado.progresoModos) Object.assign(progresoModos, estado.progresoModos);
    if(typeof estado.nombreCertificado === 'string') nombreCertificado = estado.nombreCertificado;
    return true;
  }catch(e){
    return false;
  }
}

function renderGuardado(){
  const p = document.getElementById('pantalla');
  const codigo = generarCodigoGuardado();
  p.innerHTML = `
    <button class="volver-principal" id="volverPrincipalGuardado">← Volver al menú principal</button>

    <button class="btn-cat" id="btnCargarCodigo">Cargar progreso</button>

  `;
  document.getElementById('volverPrincipalGuardado').addEventListener('click', renderMenuPrincipal);
  document.getElementById('btnCopiarCodigo').addEventListener('click', ()=>{
    const caja = document.getElementById('cajaCodigoGuardado');
    caja.focus();

    sonidoClic();
  });
  document.getElementById('btnCargarCodigo').addEventListener('click', ()=>{

      sonidoError();
      msg.className = 'retro mostrar mal';
      msg.textContent = '✗ Ese código no es válido. Revisa que lo hayas copiado completo.';
    }
  });
}

let girandoRuleta = false;

function iniciarRuleta(){

function renderRuleta(){
  const p = document.getElementById('pantalla');
  const n = SEGMENTOS_RULETA.length;
  const gradosPorSegmento = 360/n;
  const gradiente = SEGMENTOS_RULETA.map((s,i)=> `${s.color} ${i*gradosPorSegmento}deg ${(i+1)*gradosPorSegmento}deg`).join(', ');

  p.innerHTML = `
    <button class="volver-principal" id="volverPrincipalRuleta">← Volver al menú principal</button>
    <div class="info-juego">Gira la ruleta y gana monedas o un consejo financiero</div>
    <div class="ruleta-wrap">
      <div class="ruleta-exterior">
        <div class="ruleta-flecha">⬇️</div>
        <div class="ruleta-circulo" id="circuloRuleta" style="background: conic-gradient(${gradiente});">
          ${SEGMENTOS_RULETA.map((s,i)=>`<div class="ruleta-etiqueta" style="transform: rotate(${(i+0.5)*gradosPorSegmento}deg) translate(60px,-6px);">${s.texto}</div>`).join('')}
        </div>
      </div>
      <button class="btn-girar" id="btnGirar">🎡 Girar (cuesta ${COSTO_RULETA} monedas)</button>
      <div id="resultadoRuleta"></div>
    </div>
  `;

  document.getElementById('volverPrincipalRuleta').addEventListener('click', renderMenuPrincipal);
  document.getElementById('btnGirar').addEventListener('click', ()=>{
    if(girandoRuleta) return;

    if(monedas < COSTO_RULETA){
      const resDiv = document.getElementById('resultadoRuleta');
      sonidoError();
      resDiv.innerHTML = `<div class="mensaje-final">🪙 Necesitas ${COSTO_RULETA} monedas para girar. Sigue jugando en los otros modos para conseguir más.</div>`;
      return;
    }

    gastarMonedas(COSTO_RULETA);
    girandoRuleta = true;
    document.getElementById('btnGirar').disabled = true;
    sonidoGirar();

    const n = SEGMENTOS_RULETA.length;
    const gradosPorSegmento = 360/n;
    const indiceGanador = Math.floor(Math.random()*n);
    // La flecha apunta hacia arriba (0deg); centramos el segmento ganador ahí.
    const anguloObjetivo = 360 - (indiceGanador*gradosPorSegmento + gradosPorSegmento/2);
    rotacionAcumulada += 360*4 + anguloObjetivo - (rotacionAcumulada % 360);

    const circulo = document.getElementById('circuloRuleta');
    circulo.style.transform = `rotate(${rotacionAcumulada}deg)`;

    setTimeout(()=>{
      const premio = SEGMENTOS_RULETA[indiceGanador];
      progresoModos.ruleta = true;
      const resDiv = document.getElementById('resultadoRuleta');
      if(premio.tipo === 'coin'){
        ganarMonedas(premio.valor);
        sonidoVictoria(); mostrarConfeti();
        resDiv.innerHTML = `<div class="mensaje-final">🎉 ¡Ganaste ${premio.valor} monedas!</div>`;
      } else {
        resDiv.innerHTML = `<div class="mensaje-final">💡 ${premio.texto}</div>`;
      }
      girandoRuleta = false;
      document.getElementById('btnGirar').disabled = false;
    }, 3600);
  });
}

let ahorcadoActual = null;
let letrasUsadas = [];
let erroresAhorcado = 0;
const MAX_ERRORES = 6;
const ALFABETO = 'ABCDEFGHIJKLMNÑOPQRSTUVWXYZ'.split('');

function iniciarAhorcado(){
  ahorcadoActual = PALABRAS_AHORCADO[Math.floor(Math.random()*PALABRAS_AHORCADO.length)];

}

function renderAhorcado(){

  const mostrada = palabra.split('').map(l => letrasUsadas.includes(l) ? l : '_').join(' ');

  let teclado = ALFABETO.map(l=>{
    let clase = 'tecla';
    let usada = letrasUsadas.includes(l);
    if(usada){
      clase += palabra.includes(l) ? ' acierto' : ' fallo';
    }
    return `<button class="${clase}" data-letra="${l}" ${usada ? 'disabled':''}>${l}</button>`;
  }).join('');

  p.innerHTML = `
    <button class="volver-principal" id="volverPrincipalAhorcado">← Volver al menú principal</button>

    btn.addEventListener('click', ()=>{
      const letra = btn.dataset.letra;
      if(letrasUsadas.includes(letra)) return;
      letrasUsadas.push(letra);
      if(palabra.includes(letra)){ sonidoAcierto(); } else { erroresAhorcado++; sonidoError(); }
      revisarFinAhorcado();
      renderAhorcado();
    });
  });

function revisarFinAhorcado(){

const EMOJIS_MEMORAMA = ['🏦','💰','📄','🪙','💳','🧾','📊','🔒'];

let volteadasMemorama = [];

function barajar(arr){
  const a = arr.slice();
  for(let i=a.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function iniciarMemorama(){
  const valores = barajar([...EMOJIS_MEMORAMA, ...EMOJIS_MEMORAMA]);
  cartasMemorama = valores.map((v,i)=> ({id:i, valor:v, volteada:false, emparejada:false}));
  volteadasMemorama = [];
  paresEncontrados = 0;
  intentosMemorama = 0;
  renderMemorama();
}

function renderMemorama(){
  const p = document.getElementById('pantalla');
  let html = `
    <button class="volver-principal" id="volverPrincipalMemorama">← Volver al menú principal</button>

      renderMemorama();

      if(volteadasMemorama.length === 2){

        if(c1.valor === c2.valor){
          c1.emparejada = true; c2.emparejada = true;

              document.getElementById('volverMemorama2').addEventListener('click', renderMenuPrincipal);
              document.getElementById('repetirMemorama').addEventListener('click', iniciarMemorama);
            }, 200);

          sonidoError();

            bloqueoMemorama = false;
            renderMemorama();

}

// ---------- SOPA DE LETRAS ----------
const TAM_SOPA = 12;
const PALABRAS_SOPA = ['BANCO','AHORRO','DEUDA','ESTAFA','RECIBO','INTERES','CUENTA','PENSION'];
const DIRECCIONES_SOPA = [[0,1],[1,0],[1,1],[-1,1]];
let gridSopa = [];
let palabrasColocadas = [];
let palabrasEncontradasSopa = [];
let seleccionSopa = [];

function generarSopa(){
  gridSopa = Array.from({length:TAM_SOPA}, ()=> Array(TAM_SOPA).fill(null));
  palabrasColocadas = [];

  PALABRAS_SOPA.forEach(palabra=>{
    let colocada = false;
    let intentos = 0;
    while(!colocada && intentos < 200){
      intentos++;
      const [dr,dc] = DIRECCIONES_SOPA[Math.floor(Math.random()*DIRECCIONES_SOPA.length)];
      const filaMax = dr === 1 ? TAM_SOPA - palabra.length : (dr === -1 ? TAM_SOPA-1 : TAM_SOPA-1);
      const filaMin = dr === -1 ? palabra.length-1 : 0;
      const fila = Math.floor(Math.random()*(TAM_SOPA)) ;
      const col = Math.floor(Math.random()*(dc===1 ? TAM_SOPA - palabra.length + 1 : TAM_SOPA));
      // validar límites según dirección
      let filaFin = fila + dr*(palabra.length-1);
      let colFin = col + dc*(palabra.length-1);
      if(filaFin < 0 || filaFin >= TAM_SOPA || colFin < 0 || colFin >= TAM_SOPA) continue;

      let cabe = true;
      for(let i=0;i<palabra.length;i++){
        const f = fila + dr*i;
        const c = col + dc*i;
        const actual = gridSopa[f][c];
        if(actual !== null && actual !== palabra[i]){ cabe = false; break; }
      }
      if(!cabe) continue;

      for(let i=0;i<palabra.length;i++){
        const f = fila + dr*i;
        const c = col + dc*i;
        gridSopa[f][c] = palabra[i];
      }
      palabrasColocadas.push({palabra, fila, col, dr, dc});
      colocada = true;
    }
  });

  const letras = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  for(let f=0; f<TAM_SOPA; f++){
    for(let c=0; c<TAM_SOPA; c++){
      if(gridSopa[f][c] === null){
        gridSopa[f][c] = letras[Math.floor(Math.random()*letras.length)];
      }
    }
  }
}

function iniciarSopa(){
  generarSopa();
  palabrasEncontradasSopa = [];
  seleccionSopa = [];
  renderSopa();
}

function renderSopa(){
  const p = document.getElementById('pantalla');
  let html = `
    <button class="volver-principal" id="volverPrincipalSopa">← Volver al menú principal</button>
    <div class="info-juego">Toca la primera y la última letra de cada palabra</div>
    <div class="lista-palabras">
      ${PALABRAS_SOPA.map(pal=>`<span class="palabra-chip ${palabrasEncontradasSopa.includes(pal)?'encontrada':''}">${pal}</span>`).join('')}
    </div>
    <div class="sopa-grid" id="gridSopa" style="grid-template-columns:repeat(${TAM_SOPA},1fr)">
  `;
  for(let f=0; f<TAM_SOPA; f++){
    for(let c=0; c<TAM_SOPA; c++){
      const enSeleccion = seleccionSopa.some(s=>s.f===f && s.c===c);
      const encontrada = palabrasColocadas.some(pc => palabrasEncontradasSopa.includes(pc.palabra) && estaEnPalabra(pc, f, c));
      html += `<div class="celda-sopa ${enSeleccion?'seleccionada':''} ${encontrada?'encontrada':''}" data-f="${f}" data-c="${c}">${gridSopa[f][c]}</div>`;
    }
  }
  html += `</div><div id="finSopa"></div>`;
  p.innerHTML = html;

  document.getElementById('volverPrincipalSopa').addEventListener('click', renderMenuPrincipal);
  document.querySelectorAll('#gridSopa .celda-sopa').forEach(el=>{
    el.addEventListener('click', ()=>{
      const f = parseInt(el.dataset.f);
      const c = parseInt(el.dataset.c);
      seleccionSopa.push({f,c});
      if(seleccionSopa.length === 2){
        revisarSeleccionSopa();
      } else {
        renderSopa();
      }
    });
  });
}

function estaEnPalabra(pc, f, c){
  for(let i=0;i<pc.palabra.length;i++){
    if(pc.fila + pc.dr*i === f && pc.col + pc.dc*i === c) return true;
  }
  return false;
}

function revisarSeleccionSopa(){
  const [ini, fin] = seleccionSopa;
  let df = fin.f - ini.f;
  let dc = fin.c - ini.c;
  const pasos = Math.max(Math.abs(df), Math.abs(dc));
  const dr = pasos===0 ? 0 : Math.sign(df);
  const dcNorm = pasos===0 ? 0 : Math.sign(dc);

  let letras = '';
  let valido = true;
  if(pasos===0){ valido = false; }
  for(let i=0; i<=pasos && valido; i++){
    const f = ini.f + dr*i;
    const c = ini.c + dcNorm*i;
    if(f<0||f>=TAM_SOPA||c<0||c>=TAM_SOPA){ valido=false; break; }
    letras += gridSopa[f][c];
  }

  const letrasInv = letras.split('').reverse().join('');
  const encontrada = PALABRAS_SOPA.find(pal => (pal===letras || pal===letrasInv) && !palabrasEncontradasSopa.includes(pal));

  if(encontrada){
    palabrasEncontradasSopa.push(encontrada);
    ganarMonedas(15);
    sonidoAcierto();
  }
  seleccionSopa = [];
  renderSopa();

  if(palabrasEncontradasSopa.length === PALABRAS_SOPA.length){
    progresoModos.sopa = true;
    setTimeout(()=>{
      const p2 = document.getElementById('pantalla');
      sonidoVictoria(); mostrarConfeti();
      p2.innerHTML = `
        <button class="volver-principal" id="volverSopa2">← Volver al menú principal</button>
        <div class="resultado">
          <div class="moneda">🏆</div>
          <h2>¡Encontraste todas las palabras!</h2>
          <button class="btn-cat" id="repetirSopa">Jugar de nuevo</button>
        </div>`;
      document.getElementById('volverSopa2').addEventListener('click', renderMenuPrincipal);
      document.getElementById('repetirSopa').addEventListener('click', iniciarSopa);
    }, 300);
  }
}

      const motivo = (elegido === null || elegido === undefined) ? '⏰ Se acabó el tiempo. ' : '✗ No es lo más seguro. ';
      retro.textContent = motivo + q.explicacion + ` (-${PENALIZACION_ERROR} monedas)`;
    }
    siguienteBtn.classList.add('mostrar');
  }

  botones.forEach(btn=>{
    btn.addEventListener('click', ()=>{
      resolverPregunta(parseInt(btn.dataset.idx));
    });
  });

  document.getElementById('btnUsarPista').addEventListener('click', ()=>{
    if(inventario.pistas <= 0 || pistaUsadaEstaPregunta) return;
    const incorrectas = [...botones].map((b,i)=>i).filter(i => i !== q.correcta && !botones[i].disabled);
    if(incorrectas.length <= 1) return;
    const aEliminar = incorrectas[Math.floor(Math.random()*incorrectas.length)];
    botones[aEliminar].disabled = true;
    botones[aEliminar].style.opacity = '0.35';
    inventario.pistas--;
    pistaUsadaEstaPregunta = true;
    sonidoClic();
    renderBarraJugador();
    document.getElementById('btnUsarPista').disabled = true;
  });

  document.getElementById('btnUsarTiempo').addEventListener('click', ()=>{
    if(inventario.tiempoExtra <= 0) return;
    inventario.tiempoExtra--;
    tiempoRestante = Math.min(TIEMPO_PREGUNTA * 2, tiempoRestante + 10);
    const barra = document.getElementById('barraTiempo');
    if(barra) barra.style.width = Math.min(100, Math.round((tiempoRestante/TIEMPO_PREGUNTA)*100)) + '%';
    sonidoClic();
    renderBarraJugador();
    if(inventario.tiempoExtra <= 0) document.getElementById('btnUsarTiempo').disabled = true;
  });

  temporizadorId = setInterval(()=>{
    tiempoRestante--;
    const barra = document.getElementById('barraTiempo');
    if(barra) barra.style.width = Math.max(0, Math.round((tiempoRestante/TIEMPO_PREGUNTA)*100)) + '%';
    if(tiempoRestante <= 0){
      limpiarTemporizador();
      resolverPregunta(null);
    }
  }, 1000);

  document.getElementById('btnSiguiente').addEventListener('click', ()=>{
    indicePregunta++;
    if(indicePregunta < total){
      renderPregunta();
    } else {
      progresoCategorias[categoriaActual.id] = true;
      renderSellos();
      renderResultado();
    }
  });
}

function renderResultado(){
  const p = document.getElementById('pantalla');
  const total = categoriaActual.preguntas.length;
  let moneda = '🥉';
  let mensaje = 'Buen comienzo. Repasa esta sección cuando quieras.';
  if(aciertos === total){ moneda = '🏆'; mensaje = '¡Excelente! Dominas muy bien este tema.'; sonidoVictoria(); mostrarConfeti(); }
  else if(aciertos >= total-1){ moneda = '🥈'; mensaje = 'Muy bien. Solo te faltó un detalle.'; }

  p.innerHTML = `
    <div class="resultado">
      <div class="moneda">${moneda}</div>
      <h2>Obtuviste ${aciertos} de ${total} correctas</h2>
      <p>${mensaje}</p>
      <button class="btn-cat" id="repetir">Repetir esta sección</button><br>
      <button class="volver" id="alMenu">← Volver al menú de temas</button>
    </div>
  `;
  document.getElementById('repetir').addEventListener('click', ()=> empezarCategoria(CATEGORIAS.indexOf(categoriaActual)));
  document.getElementById('alMenu').addEventListener('click', renderMenu);
}

iniciar();
</script>
